version: 1

timezone: "Asia/Taipei"

db:
  path: "./app/database/temple.db" # 只在獨立跑 python -m app.scheduler.worker 時有效

smtp:
  host: "smtp.gmail.com"
  port: 587
  username_env: "GMAIL_USER"
  password_env: "GMAIL_APP_PASSWORD"
  sender_name: "TempleManager"
  use_starttls: true

reports:
  cleanup:
    enabled: true
    dir: "./reports"
    retention_days: 365
    cron:
      hour: 20
      minute: 45

jobs:
  - id: "daily_backup"
    enabled: True
    task: "backup"
    cron:
      hour: 11
      minute: 40

  - id: "heartbeat"
    enabled: true
    to:
      - "a88040303@gmail.com"
    subject: "[天南宮宮廟管理系統] Heartbeat"
    body: |
      這是一封心跳信，用於確認 mailer worker 仍在運行、寄信功能正常。
      若你收到此信，代表服務正常。
    cron:
      hour: 15
      minute: 50

  - id: "daily_finance_report"
    enabled: true
    report: "daily_finance"
    to:
      - "a88040303@gmail.com"
    subject: "[天南宮宮廟管理系統] 每日通知：每日會計彙整表"
    body: |
      這是一封自動寄送的通知信，附件：每日會計彙整表

    cron:
      hour: 15
      minute: 50

  - id: "monthly_finance_report"
    enabled: true
    report: "monthly_finance"
    subject: "[天南宮宮廟管理系統]每月會計彙整表"
    body: |
      這是一封自動寄送的通知信，附件：每月會計彙整表
    to:
      - "a88040303@gmail.com"

    cron:
      day: 3
      hour: 15
      minute: 50

  - id: "daily_activity_report"
    enabled: true
    report: "daily_activity"
    to:
      - "a88040303@gmail.com"
    subject: "[天南宮宮廟管理系統] 每日活動報名狀況"
    body: |
      這是一封自動寄送的通知信，附件：每日活動報表。
      僅於活動期間內寄送，當日若無進行中活動則不寄送。

    cron:
      hour: 15
      minute: 50

  - id: "monthly_believer_report"
    enabled: true
    report: "monthly_believer"
    to:
      - "a88040303@gmail.com"
    subject: "[天南宮宮廟管理系統] 每月信眾資料表"
    body: |
      這是一封自動寄送的通知信，附件：每月信眾資料表（含戶長與戶員）。

    cron:
      day: 7
      hour: 15
      minute: 50
